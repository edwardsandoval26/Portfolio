services:
  dev-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: sh -c "npm install && npm run dev"
    expose:
      - "3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - GITHUB_USERNAME=${GITHUB_USERNAME:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://localhost:3000}
    restart: unless-stopped

  dev:
    image: caddy:alpine
    ports:
      - "3000:3000"
    command: caddy reverse-proxy --from https://localhost:3000 --to http://dev-app:3000 --internal-certs
    depends_on:
      - dev-app
    restart: unless-stopped

  prod-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_NAME: ${NEXT_PUBLIC_NAME:-}
        NEXT_PUBLIC_EMAIL: ${NEXT_PUBLIC_EMAIL:-}
        NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-}
        NEXT_PUBLIC_LINKEDIN_URL: ${NEXT_PUBLIC_LINKEDIN_URL:-}
        NEXT_PUBLIC_LOCATION: ${NEXT_PUBLIC_LOCATION:-}
        NEXT_PUBLIC_GITHUB_USERNAME: ${NEXT_PUBLIC_GITHUB_USERNAME:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - GITHUB_USERNAME=${GITHUB_USERNAME:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://localhost}
    restart: unless-stopped

  prod:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from https://localhost --to http://prod-app:3000 --internal-certs
    depends_on:
      - prod-app
    restart: unless-stopped
